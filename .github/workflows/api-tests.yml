name: API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm install
          npx playwright install --with-deps

      - name: Run Playwright API tests
        env:
          TEST_ENV: qa
        run: npx playwright test

      - name: Setup Java (Allure needs it)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Load Previous Allure History
        if: always()
        run: |
          git fetch origin gh-pages:gh-pages --depth=1 || echo "gh-pages branch not found, skipping history"
          if git show-ref --verify --quiet refs/heads/gh-pages; then
            git checkout gh-pages -- history || echo "No history folder yet"
            mkdir -p allure-results/history
            cp -r history allure-results/ 2>/dev/null || echo "No history to copy"
            git checkout main
          fi

      - name: Generate Allure Report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          keep_files: false